<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A股盘面 · 巨头复盘 + 全市场异动</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ===== 报头 ===== -->
  <header class="masthead">
    <div class="wrap mast-in">
      <div class="mast-left">
        <div class="mast-kicker">叙事复盘 · Watchlist Review</div>
        <div class="mast-headline">
          <span class="mast-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 21h18" />
              <rect x="5" y="13" width="3.4" height="6" rx="1" />
              <rect x="10.3" y="9" width="3.4" height="10" rx="1" />
              <rect x="15.6" y="5" width="3.4" height="14" rx="1" />
            </svg>
          </span>
          <h1 class="mast-title">自选股盘面</h1>
          <span class="mast-sub">巨头核心 + 全市场异动</span>
        </div>
      </div>
      <div class="mast-right">
        <div class="dateline">
          <span class="dl-k">行情截至</span><span class="updated" id="updated">—</span>
        </div>
        <label class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" aria-hidden="true">
            <circle cx="11" cy="11" r="6.5" />
            <path d="M20 20l-3.8-3.8" />
          </svg>
          <input id="search" type="text" placeholder="搜索 名称 / 代码 / 标签 / 板块" autocomplete="off" />
        </label>
      </div>
    </div>
  </header>

  <!-- ===== 视图切换 ===== -->
  <div class="viewtabs">
    <div class="wrap viewtabs-in">
      <button class="vtab active" data-view="watch">巨头核心</button>
      <button class="vtab" data-view="market">全市场异动</button>
      <button class="vtab" data-view="hot">今日热点 · TOP30</button>
      <span class="hot-date" id="hotDate"></span>
    </div>
  </div>

  <!-- ===== 市场速览条：真实大盘指数 + 信号统计 ===== -->
  <div class="wrap watch-only">
    <section class="market-bar">
      <div class="mb-indices" id="marketSnap"></div>
      <div class="mb-stat" id="signalStat"></div>
    </section>
  </div>

  <!-- ===== AI 复盘（Hermes 定时任务导出的全网调研报告） ===== -->
  <div class="wrap watch-only">
    <section class="reports" id="reports"></section>
  </div>

  <!-- ===== 自选股视图：不对称双栏 ===== -->
  <div class="wrap watch-only board">
    <aside class="rail">
      <section class="rail-block">
        <h2 class="rail-h">盘面速览 <span class="rail-en">At a glance</span></h2>
        <div class="stats" id="stats"></div>
      </section>
      <section class="rail-block">
        <h2 class="rail-h">板块 <span class="rail-en">Sectors</span></h2>
        <div class="filter-group sector-list" id="sectorChips"></div>
      </section>
    </aside>

    <div class="main-col">
      <nav class="filters">
        <div class="filters-in">
          <div class="filter-group verdicts">
            <button class="chip verdict-chip v-opp" data-verdict="opportunity">今日买点</button>
            <button class="chip verdict-chip" data-verdict="all">全部结论</button>
            <button class="chip verdict-chip v-ok" data-verdict="成立">成立</button>
            <button class="chip verdict-chip v-warn" data-verdict="存疑">存疑</button>
            <button class="chip verdict-chip v-bad" data-verdict="证伪">证伪</button>
            <button class="chip verdict-chip v-change" data-verdict="changed">叙事有变化</button>
            <label class="sort-box">排序
              <select id="sort">
                <option value="default">默认(板块)</option>
                <option value="chg">今日涨幅 ↓</option>
                <option value="toBreakout">距突破 ↑(右侧近)</option>
                <option value="pullback">回踩距离 ↑(左侧近)</option>
                <option value="trend">趋势强度 ↓</option>
              </select>
            </label>
          </div>
        </div>
      </nav>
      <main class="grid" id="grid"></main>
    </div>
  </div>

  <!-- ===== 全市场异动视图 ===== -->
  <div class="wrap market-only">
    <!-- 打板情绪条(炸板率/连板梯队/晋级率) -->
    <section class="sentiment-bar" id="sentimentBar"></section>

    <!-- 异动筛选 -->
    <nav class="filters market-filters">
      <div class="filters-in">
        <div class="filter-group anomaly-types" id="anomalyChips">
          <button class="chip anomaly-chip v-opp active" data-anomaly="gainers">涨幅 TOP</button>
          <button class="chip anomaly-chip v-bad" data-anomaly="losers">跌幅 TOP</button>
          <button class="chip anomaly-chip v-change" data-anomaly="turnover">换手 TOP</button>
          <button class="chip anomaly-chip v-ok" data-anomaly="inflow">主力流入</button>
          <button class="chip anomaly-chip v-warn" data-anomaly="outflow">主力流出</button>
          <button class="chip anomaly-chip v-opp" data-anomaly="limitUp">涨停池</button>
          <button class="chip anomaly-chip v-bad" data-anomaly="limitDown">跌停池</button>
          <button class="chip anomaly-chip v-change" data-anomaly="brokeUp">炸板池</button>
          <button class="chip anomaly-chip v-ok" data-anomaly="hotRank">人气榜</button>
          <button class="chip anomaly-chip v-opp" data-anomaly="dragonTiger">龙虎榜</button>
        </div>
      </div>
    </nav>

    <!-- 异动卡网格 -->
    <main class="grid market-grid" id="marketGrid"></main>
  </div>

  <!-- ===== 热点视图 ===== -->
  <div class="wrap hot-only"><main class="hotlist" id="hotList"></main></div>

  <footer class="foot">
    <div class="wrap foot-in">
      <span id="count">—</span>
      <span class="disclaimer">本看板数据自动整理/测算，仅供研究参考，<b>不构成任何投资建议</b>。投资有风险，决策需独立判断。</span>
    </div>
  </footer>

  <!-- 详情抽屉 -->
  <div class="drawer-backdrop" id="backdrop"></div>
  <aside class="drawer" id="drawer" aria-hidden="true">
    <div class="drawer-inner" id="drawerInner"></div>
  </aside>

  <script src="data.js"></script>
  <script src="meta.js"></script>
  <script src="hot.js"></script>
  <script src="market.js"></script>
  <script src="reports.js"></script>
  <script src="app.js"></script>
</body>
</html>
