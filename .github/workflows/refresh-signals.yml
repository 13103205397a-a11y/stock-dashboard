name: 刷新行情技术信号

# A 股收盘(15:00 北京)后,在 GitHub 服务器上抓真实日K并重算
# 价格/均线/支撑/突破/止损/走势图,自动提交回仓库。
on:
  schedule:
    # GitHub 定时器在高负载时会延迟甚至丢弃，故排 4 个时间点多次重试。
    # 周末 A 股无交易但跑了也无害（幂等，无新数据则不提交）。
    # 关键：周一早上补跑周末数据，避免断档。北京时间 = UTC + 8。
    - cron: "20 7 * * *"     # 15:20 北京 - 收盘后首试
    - cron: "40 8 * * *"      # 16:40 北京 - 备用
    - cron: "10 10 * * *"     # 18:10 北京 - 兜底
    - cron: "0 1 * * 1-5"     # 09:00 周一-周五 - 盘前补跑(防昨日漏跑)
  workflow_dispatch: {}

permissions:
  contents: write

# 不用 concurrency：多个定时任务各自独立运行，互不取消
# 即使前一次还没跑完，下一次也会正常启动（git push 有锁保护）

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 Python 依赖
        run: pip install --quiet requests numpy pandas mootdx

      - name: 抓取日K(腾讯前复权)
        run: bash scripts/fetch_klines.sh

      - name: 重算技术信号 -> 写回 data.js / meta.js
        run: node scripts/fetch_signals.js

      - name: 抓取新闻+公告 -> 写回 data.js
        run: python3 scripts/fetch_news.py
        continue-on-error: true

      - name: 补齐资金面/研报/估值 -> 写回 data.js
        run: python3 scripts/fetch_enhanced.py
        continue-on-error: true

      - name: 全市场异动扫描 -> 写回 market.js
        run: python3 scripts/fetch_market.py
        continue-on-error: true

      - name: 持仓决策数据 -> 写回 holdings.js
        run: python3 scripts/fetch_holdings.py
        continue-on-error: true

      - name: 产业雷达数据 -> 写回 industry.js
        run: python3 scripts/fetch_industry.py
        continue-on-error: true

      - name: 新闻全量数据 -> 写回 newsall.js
        run: python3 scripts/fetch_news_all.py
        continue-on-error: true

      - name: 抓取今日热点 TOP30 -> 写回 hot.js
        continue-on-error: true
        env:
          IWENCAI_API_KEY: ${{ secrets.IWENCAI_API_KEY }}
        run: |
          if [ -z "$IWENCAI_API_KEY" ]; then
            echo "::warning::未配置 IWENCAI_API_KEY secret，跳过热点抓取。"
          else
            python3 scripts/fetch_hot.py
          fi

      - name: 提交并推送(仅在有变化时)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 注意：weekend.js / reports.js / portfolio_analysis.js 由本地 Hermes Agent 生成
          # （非 GitHub Actions），不在此提交。如本地 Hermes 未运行，这三个文件会过期。
          git add data.js meta.js hot.js market.js holdings.js industry.js logic.js events.js opportunities.js materials.js newsall.js
          if git diff --cached --quiet; then
            echo "行情无变化,跳过提交。"
          else
            git commit -m "行情刷新 $(TZ=Asia/Shanghai date +%F)（GitHub Actions 自动）"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}"
            echo "已推送行情更新。"
          fi
