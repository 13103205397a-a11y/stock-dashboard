name: 刷新行情技术信号

# A 股收盘(15:00 北京)后,在 GitHub 服务器上抓真实日K并重算
# 价格/均线/支撑/突破/止损/走势图,自动提交回仓库。
# 与云端「叙事复盘」Agent(16:00 北京)分工:本工作流管行情,Agent 管叙事。
on:
  schedule:
    # 15:20 北京时间(= 07:20 UTC),工作日。比 16:00 的叙事复盘早,保证它能读到最新信号。
    - cron: "20 7 * * 1-5"
  workflow_dispatch: {}   # 支持手动触发(仓库 Actions 页面点 Run workflow)

permissions:
  contents: write          # 允许用内置 GITHUB_TOKEN 推送

concurrency:
  group: refresh-signals
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 抓取日K(腾讯前复权)
        run: bash scripts/fetch_klines.sh

      - name: 重算技术信号 → 写回 data.js / meta.js
        run: node scripts/fetch_signals.js

      - name: 提交并推送(仅在有变化时)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js meta.js
          if git diff --cached --quiet; then
            echo "行情无变化,跳过提交。"
          else
            git commit -m "行情刷新 $(TZ=Asia/Shanghai date +%F)（GitHub Actions 自动）"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}"
            echo "已推送行情更新。"
          fi
