name: 刷新行情技术信号

# A 股收盘(15:00 北京)后,在 GitHub 服务器上抓真实日K并重算
# 价格/均线/支撑/突破/止损/走势图,自动提交回仓库。
# 与云端「叙事复盘」Agent(16:00 北京)分工:本工作流管行情,Agent 管叙事。
on:
  schedule:
    # GitHub 定时器在高负载时会延迟甚至丢弃，故排 4 个时间点多次重试。
    # 周末 A 股无交易但跑了也无害（幂等，无新数据则不提交）。
    # 关键：周一早上补跑周末数据，避免断档。北京时间 = UTC + 8。
    - cron: "20 7 * * *"     # 15:20 北京 — 收盘后首试
    - cron: "40 8 * * *"      # 16:40 北京 — 备用
    - cron: "10 10 * * *"     # 18:10 北京 — 兜底
    - cron: "0 1 * * 1-5"     # 09:00 周一-周五 — 盘前补跑(防昨日漏跑)
  workflow_dispatch: {}   # 支持手动触发(仓库 Actions 页面点 Run workflow)

permissions:
  contents: write          # 允许用内置 GITHUB_TOKEN 推送

concurrency:
  group: refresh-signals
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 Python 依赖(问财技能 + a-stock-pro 用)
        run: pip install --quiet requests numpy pandas

      - name: 抓取日K(腾讯前复权)
        run: bash scripts/fetch_klines.sh

      - name: 重算技术信号 → 写回 data.js / meta.js
        run: node scripts/fetch_signals.js

      - name: 抓取新闻+公告(东方财富,免费,规则筛选) → 写回 data.js
        run: python3 scripts/fetch_news.py
        continue-on-error: true        # 新闻抓取异常不阻断技术信号提交

      - name: 补齐资金面/研报/估值(a-stock-pro,免key) → 写回 data.js
        # 用 vendored 的 a-stock-pro skill 填 fund/research/valuation 三类字段。
        # 全部走东财/腾讯 HTTP 端点,免 key,海外机房可跑(不调 mootdx)。
        run: python3 scripts/fetch_enhanced.py
        continue-on-error: true        # 异常不阻断其他步骤提交

      - name: 全市场异动扫描(a-stock-pro,免key) → 写回 market.js
        # 采集涨停/炸板/跌停/涨跌幅TOP/换手TOP/资金流TOP/人气榜/龙虎榜/北向,全免key。
        run: python3 scripts/fetch_market.py
        continue-on-error: true        # 异常不阻断其他步骤提交

      - name: 持仓决策数据(德业+信维,免key) → 写回 holdings.js
        run: python3 scripts/fetch_holdings.py
        continue-on-error: true

      - name: 产业雷达数据(行业排名,免key) → 写回 industry.js
        run: python3 scripts/fetch_industry.py
        continue-on-error: true

      - name: 新闻全量数据(全球资讯+公告,免key) → 写回 newsall.js
        run: python3 scripts/fetch_news_all.py
        continue-on-error: true

      - name: 抓取今日热点 TOP30(同花顺问财:热度/题材) → 写回 hot.js
        # 只在首次(15:20)和手动触发时跑，避免重复消耗问财配额。
        # 判断依据：hot.js 里的日期是不是今天（不再依赖容器内的标记文件）。
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '20 7 * * *'
        continue-on-error: true
        env:
          IWENCAI_API_KEY: ${{ secrets.IWENCAI_API_KEY }}
        run: |
          if [ -z "$IWENCAI_API_KEY" ]; then
            echo "::warning::未配置 IWENCAI_API_KEY secret，跳过热点抓取。"
          else
            python3 scripts/fetch_hot.py
          fi

      - name: 提交并推送(仅在有变化时)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js meta.js hot.js market.js holdings.js industry.js newsall.js
          if git diff --cached --quiet; then
            echo "行情无变化,跳过提交。"
          else
            git commit -m "行情刷新 $(TZ=Asia/Shanghai date +%F)（GitHub Actions 自动）"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}"
            echo "已推送行情更新。"
          fi
