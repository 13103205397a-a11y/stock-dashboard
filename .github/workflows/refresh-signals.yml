name: 刷新行情技术信号

# A 股收盘(15:00 北京)后,在 GitHub 服务器上抓真实日K并重算
# 价格/均线/支撑/突破/止损/走势图,自动提交回仓库。
# 与云端「叙事复盘」Agent(16:00 北京)分工:本工作流管行情,Agent 管叙事。
on:
  schedule:
    # GitHub 定时器在高负载时会延迟甚至丢弃,故排 3 个收盘后的时间多次重试。
    # 运行是幂等的(无新数据则不提交),跑多次也安全。北京时间 = UTC + 8。
    - cron: "20 7 * * 1-5"    # 15:20 北京 — 收盘后首试,赶在 16:00 叙事复盘前
    - cron: "40 8 * * 1-5"    # 16:40 北京 — 备用
    - cron: "10 10 * * 1-5"   # 18:10 北京 — 兜底
  workflow_dispatch: {}   # 支持手动触发(仓库 Actions 页面点 Run workflow)

permissions:
  contents: write          # 允许用内置 GITHUB_TOKEN 推送

concurrency:
  group: refresh-signals
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 清除昨日问财完成标记（确保当日兜底逻辑正确）
        run: |
          if [ -f .iwencai-done ]; then
            OLD=$(cat .iwencai-done)
            NOW=$(TZ=Asia/Shanghai date +%F)
            if [ "$OLD" != "$NOW" ]; then rm -f .iwencai-done; echo "清除昨日标记($OLD)，当日重抓。"; fi
          fi

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装 Python 依赖(问财技能用)
        run: pip install --quiet requests numpy

      - name: 抓取日K(腾讯前复权)
        run: bash scripts/fetch_klines.sh

      - name: 重算技术信号 → 写回 data.js / meta.js
        run: node scripts/fetch_signals.js

      # 问财调用耗配额。策略：只在当日尚未成功抓取过消息面时才跑，
      # 用标记文件 .iwencai-done 记录当日是否已成功，避免兜底时间重复浪费配额。
      # 15:20 首试；若失败（配额耗尽/接口抖动），16:40 / 18:10 兜底会因标记缺失而重试。
      - name: 抓取消息面(同花顺问财:资金流/新闻/研报) → 写回 data.js
        if: github.event_name == 'workflow_dispatch' || !hashFiles('.iwencai-done')
        continue-on-error: true        # 问财异常(含当日配额耗尽)不阻断技术信号提交
        env:
          IWENCAI_API_KEY: ${{ secrets.IWENCAI_API_KEY }}
        run: |
          if [ -z "$IWENCAI_API_KEY" ]; then
            echo "::warning::未配置 IWENCAI_API_KEY secret，跳过消息面抓取。"
          else
            python3 scripts/fetch_iwencai.py && echo "$(TZ=Asia/Shanghai date +%F)" > .iwencai-done
          fi

      - name: 抓取今日热点 TOP30(同花顺问财:热度/题材/技术/情绪) → 写回 hot.js
        if: github.event_name == 'workflow_dispatch' || !hashFiles('.iwencai-done')
        continue-on-error: true        # 热点异常不阻断其余提交
        env:
          IWENCAI_API_KEY: ${{ secrets.IWENCAI_API_KEY }}
        run: |
          if [ -z "$IWENCAI_API_KEY" ]; then
            echo "::warning::未配置 IWENCAI_API_KEY secret，跳过热点抓取。"
          else
            python3 scripts/fetch_hot.py
          fi

      - name: 提交并推送(仅在有变化时)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js meta.js hot.js
          if git diff --cached --quiet; then
            echo "行情无变化,跳过提交。"
          else
            git commit -m "行情刷新 $(TZ=Asia/Shanghai date +%F)（GitHub Actions 自动）"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}"
            echo "已推送行情更新。"
          fi
