name: 刷新行情技术信号

# A 股收盘(15:00 北京)后,在 GitHub 服务器上抓真实日K并重算
# 价格/均线/支撑/突破/止损/走势图,自动提交回仓库。
on:
  schedule:
    # GitHub 定时器在高负载时会延迟甚至丢弃，故排 4 个时间点多次重试。
    # 周末 A 股无交易但跑了也无害（幂等，无新数据则不提交）。
    # 关键：周一早上补跑周末数据，避免断档。北京时间 = UTC + 8。
    - cron: "20 7 * * *"     # 15:20 北京 - 收盘后首试
    - cron: "40 8 * * *"      # 16:40 北京 - 备用
    - cron: "10 10 * * *"     # 18:10 北京 - 兜底
    - cron: "0 1 * * 1-5"     # 09:00 周一-周五 - 盘前补跑(防昨日漏跑)
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: stock-dashboard-refresh-${{ github.ref }}
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 检出仓库
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 安装 Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: 安装 Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: 安装 Python 依赖
        run: pip install --quiet requests numpy pandas mootdx lxml

      - name: 抓取日K(腾讯前复权)
        run: bash scripts/fetch_klines.sh

      - name: 重算技术信号 -> 写回 data.js / meta.js
        run: node scripts/fetch_signals.js

      - name: 抓取新闻+公告 -> 写回 data.js
        run: python3 scripts/fetch_news.py
        continue-on-error: true

      - name: 补齐资金面/研报/估值 -> 写回 data.js
        run: python3 scripts/fetch_enhanced.py
        continue-on-error: true

      - name: 全市场异动扫描 -> 写回 market.js
        run: python3 scripts/fetch_market.py

      - name: 行业板块排行 -> 写回 industry_market.js
        run: python3 scripts/fetch_industry.py
        continue-on-error: true

      - name: 新闻全量数据 -> 写回 newsall.js
        run: python3 scripts/fetch_news_all.py
        continue-on-error: true

      - name: 抓取今日热点 TOP30 -> 写回 hot.js
        continue-on-error: true
        env:
          IWENCAI_API_KEY: ${{ secrets.IWENCAI_API_KEY }}
        run: |
          if [ -z "$IWENCAI_API_KEY" ]; then
            echo "::warning::未配置 IWENCAI_API_KEY secret，跳过热点抓取。"
          else
            python3 scripts/fetch_hot.py
          fi

      - name: 校验公开数据结构
        run: |
          python3 scripts/sanitize_ai_content.py
          node scripts/validate_data.js
          node scripts/check_freshness.js --strict

      - name: 提交并推送(仅在有变化时)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # holdings.js / portfolio_analysis.js 含个人数据，不提交也不发布；
          # weekend.js / reports.js 由本地生成，本工作流不改写，但 Pages 可发布仓库中的公开快照。
          git add data.js meta.js hot.js market.js industry.js industry_market.js logic.js events.js opportunities.js materials.js newsall.js
          if git diff --cached --quiet; then
            echo "行情无变化,跳过提交。"
          else
            git commit -m "行情刷新 $(TZ=Asia/Shanghai date +%F)（GitHub Actions 自动）"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
            echo "已推送行情更新。"
          fi

      - name: 刷新失败告警
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          title="自动行情刷新失败"
          body="自动行情刷新在 $(TZ=Asia/Shanghai date '+%F %T') 失败。运行记录：${RUN_URL}"
          issue_number="$(gh issue list --state open --search "${title} in:title" --json number --jq '.[0].number // empty')"
          if [ -n "$issue_number" ]; then
            gh issue comment "$issue_number" --body "$body"
          else
            gh issue create --title "$title" --body "$body"
          fi
