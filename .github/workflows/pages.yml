name: 页面构建和部署

on:
  push:
    branches: [main]
  schedule:
    # 每天 19:00/20:00/21:00 北京时间保底部署
    - cron: "0 11 * * *"
    - cron: "0 12 * * *"
    - cron: "0 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# 不用 concurrency：多个 push 各自独立部署，互不取消
# GitHub Pages 后端会自动处理并发部署（后者覆盖前者）

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deploy1.outputs.page_url || steps.deploy2.outputs.page_url || steps.deploy3.outputs.page_url }}
    steps:
      - name: 检出仓库
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 校验公开数据结构
        run: |
          node scripts/validate_data.js
          node scripts/check_freshness.js --strict

      - name: 核心回归测试
        run: |
          npm test

      - name: 筛选 web 文件
        run: python3 scripts/build_site.py _site

      - name: 配置 Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

      # GitHub Pages 后端偶发返回 failed，多次重试递增等待
      - name: 部署尝试 1
        id: deploy1
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        with:
          artifact_name: github-pages
        continue-on-error: true

      - name: 等待重试 1
        if: steps.deploy1.outcome != 'success'
        run: |
          echo "部署 1 失败(${{ steps.deploy1.outcome }})，等待 30 秒后重试"
          sleep 30

      - name: 部署尝试 2
        id: deploy2
        if: steps.deploy1.outcome != 'success'
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        with:
          artifact_name: github-pages
        continue-on-error: true

      - name: 等待重试 2
        if: steps.deploy1.outcome != 'success' && steps.deploy2.outcome != 'success'
        run: |
          echo "部署 2 失败(${{ steps.deploy2.outcome }})，等待 60 秒后重试"
          sleep 60

      - name: 部署尝试 3
        id: deploy3
        if: steps.deploy1.outcome != 'success' && steps.deploy2.outcome != 'success'
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        with:
          artifact_name: github-pages

      - name: 部署结果汇总
        if: always()
        run: |
          echo "部署 1: ${{ steps.deploy1.outcome }}"
          echo "部署 2: ${{ steps.deploy2.outcome }}"
          echo "部署 3: ${{ steps.deploy3.outcome }}"
          if [ "${{ steps.deploy1.outcome }}" = "success" ] || [ "${{ steps.deploy2.outcome }}" = "success" ] || [ "${{ steps.deploy3.outcome }}" = "success" ]; then
            echo "✓ 至少一次部署成功"
          else
            echo "✗ 三次部署全部失败"
            exit 1
          fi

      - name: 线上资源探针
        if: steps.deploy1.outcome == 'success' || steps.deploy2.outcome == 'success' || steps.deploy3.outcome == 'success'
        env:
          PAGE_URL: ${{ steps.deploy1.outputs.page_url || steps.deploy2.outputs.page_url || steps.deploy3.outputs.page_url }}
        run: |
          set -euo pipefail
          base="${PAGE_URL%/}"
          for asset in index.html app.js styles.css design-system.css data.js meta.js hot.js market.js industry.js industry_market.js logic.js events.js opportunities.js materials.js newsall.js weekend.js reports.js; do
            curl --fail --silent --show-error \
              --retry 5 --retry-delay 3 --retry-all-errors \
              "$base/$asset" > /dev/null
            echo "✓ $asset 可访问"
          done
