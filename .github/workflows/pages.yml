name: 页面构建和部署

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v7

      - name: 配置 Pages
        uses: actions/configure-pages@v6

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy1.outputs.page_url || steps.deploy2.outputs.page_url || steps.deploy3.outputs.page_url }}
    steps:
      # GitHub Pages 后端偶发返回 "Deployment failed, try again later":
      # 部署请求本身成功创建,但轮询到的最终状态是 failed。
      # 这种失败与 deploy-pages 的 error_count 无关(状态请求本身没出错,
      # 是后端把部署标记成了 failed),加大 error_count 救不了。
      # 解法:多次重试,递增等待(30s → 60s → 90s),让后端有时间恢复。
      - name: 部署尝试 1
        id: deploy1
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages
        continue-on-error: true

      - name: 等待重试 1
        if: steps.deploy1.outcome != 'success'
        run: |
          echo "部署 1 失败(${{ steps.deploy1.outcome }}),等待 30 秒后重试"
          sleep 30

      - name: 部署尝试 2
        id: deploy2
        if: steps.deploy1.outcome != 'success'
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages
        continue-on-error: true

      - name: 等待重试 2
        if: steps.deploy1.outcome != 'success' && steps.deploy2.outcome != 'success'
        run: |
          echo "部署 2 失败(${{ steps.deploy2.outcome }}),等待 60 秒后重试"
          sleep 60

      - name: 部署尝试 3
        id: deploy3
        if: steps.deploy1.outcome != 'success' && steps.deploy2.outcome != 'success'
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages

      - name: 部署结果汇总
        if: always()
        run: |
          echo "部署 1: ${{ steps.deploy1.outcome }}"
          echo "部署 2: ${{ steps.deploy2.outcome }}"
          echo "部署 3: ${{ steps.deploy3.outcome }}"
          if [ "${{ steps.deploy1.outcome }}" = "success" ] || [ "${{ steps.deploy2.outcome }}" = "success" ] || [ "${{ steps.deploy3.outcome }}" = "success" ]; then
            echo "✓ 至少一次部署成功"
          else
            echo "✗ 三次部署全部失败"
            exit 1
          fi
