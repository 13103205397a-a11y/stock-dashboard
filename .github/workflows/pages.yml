name: 页面构建和部署

on:
  push:
    branches: [main]
    # 只在页面骨架变更时才部署;数据文件(AI复盘/行情刷新自动生成)
    # 频繁变动但不影响页面结构,无需每次触发部署。
    paths-ignore:
      - 'data.js'
      - 'meta.js'
      - 'hot.js'
      - 'market.js'
      - 'holdings.js'
      - 'industry.js'
      - 'logic.js'
      - 'events.js'
      - 'opportunities.js'
      - 'materials.js'
      - 'newsall.js'
      - 'reports.js'
  schedule:
    # 每天北京 19:00(UTC 11:00)定时部署一次,
    # 把当天收盘后(行情刷新兜底 18:10 + AI 复盘)更新的数据发布上线。
    # 数据 push 本身不触发部署(见 paths-ignore),由这个定时统一发布。
    - cron: "0 11 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v7

      - name: 配置 Pages
        uses: actions/configure-pages@v6

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v5
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    steps:
      # GitHub Pages 后端偶发返回 "Deployment failed, try again later":
      # 部署请求本身成功创建,但轮询到的最终状态是 failed。
      # 这种失败与 deploy-pages 的 error_count 无关(状态请求本身没出错,
      # 是后端把部署标记成了 failed),加大 error_count 救不了。
      # 解法:第一次失败后不阻塞 job,用第二个步骤重试一次。
      - name: 部署到 GitHub Pages(首次)
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages
        continue-on-error: true

      - name: 首次部署结果
        if: always()
        run: |
          if [ "${{ steps.deployment.outcome }}" = "success" ]; then
            echo "首次部署成功,跳过重试"
          else
            echo "首次部署结果为 ${{ steps.deployment.outcome }},等待 20 秒后重试"
            sleep 20
          fi

      - name: 部署到 GitHub Pages(重试)
        id: deployment_retry
        if: steps.deployment.outcome != 'success'
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages
